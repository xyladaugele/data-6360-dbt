version: 2

models:
  - name: dim_campaign
    description: "Ecoessentials Campaign Dimension"
    columns: 
     - name: campaign_discount
       description: "Ensuring that all promotions have an attached campaign discount"
       tests:
          - not_null

  - name: dim_email
    description: "Ecoessentials Email Dimension"
    columns: 
      - name: emailname
        description: "Subject line of the email" 
        tests:
          - not_null
  
  - name: dim_event
    description: "Ecoessentials Event Dimension"
    columns:
      - name: eventtype
        tests:
          - accepted_values:
              arguments:
                values:
                  - "SENT"
                  - "OPEN"
                  - "CLICK"

  - name: dim_product
    description: "Ecoessentials Product Dimension"
    columns:
      - name: product_type
        tests:
          - accepted_values:
              arguments:
                values:
                  - "pan"
                  - "storage"
                  - "utensil"
                  - "pot"
                  - "cutting_board"
                  - "accessory"

  - name: dim_time
    description: "Ecoessentials Time Dimension"
    columns:
      - name: timekey
        tests: 
          - unique 
  
  - name: dim_cust
    description: "Ecoessentials Customer Dimension"
    columns:
      - name: custkey
        tests: 
          - unique 
  
  - name: eco_dim_date
    description: "Ecoessentials Date Dimension"
    columns:
      - name: datekey
        tests: 
          - unique 

  - name: eco_fact_sales
    description: "Ecoessentials Sales Fact"
    columns:
      - name: custkey
        tests:
          - relationships:
              arguments:
                to: ref('dim_cust') # source dimensions
                field: custkey # column in the source table
  
  - name: fact_marketingemails
    description: "Ecoessentials Marketing Emails Fact"
    columns:
      - name: timekey
        tests:
          - relationships:
              arguments:
                to: ref('dim_time') # source dimensions
                field: timekey # column in the fact table